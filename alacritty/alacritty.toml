[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[window]
padding = { x = 12, y = 12 }
opacity = 1
decorations_theme_variant = "Dark"

[colors]
draw_bold_text_with_bright_colors = true

# GNOME Tango colors
[colors.primary]
background = "#212020"
foreground = "#FCFCFC"

[colors.normal]
black   = "#2E3436"
red     = "#CC0000"
green   = "#4E9A06"
yellow  = "#C4A000"
blue    = "#3465A4"
magenta = "#75507B"
cyan    = "#06989A"
white   = "#D3D7CF"

[colors.bright]
black   = "#555753"
red     = "#EF2929"
green   = "#8AE234"
yellow  = "#FCE94F"
blue    = "#729FCF"
magenta = "#AD7FA8"
cyan    = "#34E2E2"
white   = "#EEEEEC"
